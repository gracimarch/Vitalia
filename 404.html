<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#B571DE">
    <title>Página no encontrada | Vitalia</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/assets/favicons/vitalia-favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/assets/favicons/vitalia-favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/favicons/vitalia-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/pages/404style.css?v=20260411">
</head>

<body>
    <!-- Floating circles (Gracias style) -->
    <div class="float-wrapper float-1">
        <div class="float-icon icon-1"><i class="fa-solid fa-heart"></i></div>
    </div>
    <div class="float-wrapper float-2">
        <div class="float-icon icon-2"><i class="fa-solid fa-dumbbell"></i></div>
    </div>
    <div class="float-wrapper float-3">
        <div class="float-icon icon-3"><i class="fa-solid fa-bowl-rice"></i></div>
    </div>
    <div class="float-wrapper float-4">
        <div class="float-icon icon-4"><i class="fa-solid fa-spa"></i></div>
    </div>
    <div class="float-wrapper float-5">
        <div class="float-icon icon-5"><i class="fa-solid fa-lightbulb"></i></div>
    </div>

    <!-- Main Content -->
    <div class="container-404" id="error-container" style="display: none;">
        <a href="/" class="logo-link">
            <img src="/assets/images/ui/vitalia-logo.svg" alt="Vitalia Logo">
        </a>
        <div class="error-code">404</div>
        <h1 class="error-title">¡Oops, <span class="error-highlight">página no encontrada!</span></h1>
        <p class="error-message">
            La página que buscas fue movida, eliminada o quizás nunca existió.<br>
            No te preocupes, te llevamos de vuelta.
        </p>
        <button onclick="history.length > 1 ? history.back() : location.href='/'" class="btn-home">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
            Volver atrás
        </button>
    </div>

    <script src="/assets/js/pages/404-router.js?v=20260411"></script>
    <script src="/assets/js/effects/magnetic-icons.js?v=20260411"></script>
</body>

</html>
