<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#80CACD">
    <title>Vitalia | Plan Alimenticio</title>
    <link rel="canonical" href="https://vitalia-selfcare.vercel.app/dietas/">

    <meta name="description"
        content="Plan para mantener altos niveles de energía y vitalidad con una dieta de alimentos integrales, ricos en nutrientes y antioxidantes.">
    <meta name="keywords"
        content="energía, vitalidad, dieta saludable, alimentos integrales, nutrientes, antioxidantes, salud general">

    <meta property="og:title" content="Vitalia | Plan Alimenticio">
    <meta property="og:description"
        content="Plan para mantener altos niveles de energía y vitalidad con una dieta de alimentos integrales, ricos en nutrientes y antioxidantes.">
    <meta property="og:image" content="https://vitalia-selfcare.vercel.app/assets/images/ui/og-vitalia.jpg">
    <meta property="og:url" content="https://vitalia-selfcare.vercel.app/dietas/">
    <meta name="twitter:title" content="Vitalia | Plan Alimenticio">
    <meta name="twitter:description"
        content="Plan para mantener altos niveles de energía y vitalidad con una dieta de alimentos integrales, ricos en nutrientes y antioxidantes.">
    <meta name="twitter:image" content="https://vitalia-selfcare.vercel.app/assets/images/ui/og-vitalia.jpg">
    <link rel="icon" href="/assets/favicons/vitalia-favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/assets/favicons/vitalia-favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/favicons/vitalia-favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/core/variables.css">
    <link rel="stylesheet" href="/assets/css/pages/dietstyle.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <script src="/assets/js/core/router.js"></script>
</head>

<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- ============================================ -->
    <!-- HERO SECTION                                 -->
    <!-- ============================================ -->
    <section class="diet-hero" id="diet-hero">
        <img class="diet-hero__img" id="diet-hero-img" src="" alt="">
        <div class="diet-hero__overlay"></div>

        <!-- Back button -->
        <button class="diet-back-btn" id="btn-back" onclick="history.back()" aria-label="Volver">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="diet-hero__content">
            <p class="diet-hero__type" id="diet-hero-type"></p>
            <h1 class="diet-hero__title" id="diet-hero-title"></h1>
            <div class="diet-hero__badges" id="diet-hero-badges"></div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- TAB NAVIGATION                               -->
    <!-- ============================================ -->
    <nav class="diet-tabs-wrapper" role="tablist" aria-label="Secciones del plan">
        <div class="diet-tabs">
            <button class="diet-tab active" data-panel="panel-plan" role="tab" aria-selected="true" id="tab-plan">
                <i class="fa-regular fa-calendar"></i> Plan
            </button>
            <button class="diet-tab" data-panel="panel-recipes" role="tab" aria-selected="false" id="tab-recipes">
                <i class="fa-solid fa-book-open"></i> Recetas
            </button>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- MAIN CONTENT                                 -->
    <!-- ============================================ -->
    <main class="diet-content" id="diet-content">

        <!-- PANEL 1: Plan -->
        <section id="panel-plan" class="diet-panel active" role="tabpanel" aria-labelledby="tab-plan">

            <!-- Introduction -->
            <div class="diet-intro-card" id="diet-introduction">
                <!-- Loaded dynamically -->
            </div>

            <!-- Two-column layout: schedule + calendar -->
            <div class="plan-layout">

                <!-- Left: schedule -->
                <div class="plan-layout__schedule">
                    <p class="diet-section-title">Programa alimenticio</p>

                    <!-- Day pills navigation -->
                    <div class="day-pills" id="day-pills" role="tablist" aria-label="Días">
                        <!-- Loaded dynamically -->
                    </div>

                    <!-- Day panels (meal cards) -->
                    <div id="day-panels">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Right: compact calendar -->
                <div class="plan-layout__calendar">
                    <div id="diet-calendar-wrap"></div>
                </div>

            </div>

        </section>

        <!-- PANEL 2: Recipes -->
        <section id="panel-recipes" class="diet-panel" role="tabpanel" aria-labelledby="tab-recipes">
            <div class="recipes-panel-header">
                <p class="diet-section-title" style="padding-top:24px; margin-bottom:0">Todas las recetas</p>

                <!-- Diet filter dropdown (visual only) -->
                <details class="diet-filter">
                    <summary class="diet-filter__toggle">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>Adaptar plan</span>
                        <i class="fa-solid fa-chevron-down diet-filter__chevron"></i>
                    </summary>
                    <div class="diet-filter__menu">
                        <label class="diet-filter__option">
                            <input type="checkbox" class="diet-filter__check" disabled>
                            <span class="diet-filter__pill">
                                <i class="fa-solid fa-shield-halved"></i> Sin gluten
                            </span>
                        </label>
                        <label class="diet-filter__option">
                            <input type="checkbox" class="diet-filter__check" disabled>
                            <span class="diet-filter__pill">
                                <i class="fa-solid fa-tint"></i> Sin lácteos
                            </span>
                        </label>
                        <label class="diet-filter__option">
                            <input type="checkbox" class="diet-filter__check" disabled>
                            <span class="diet-filter__pill">
                                <i class="fa-solid fa-leaf"></i> Vegetariano
                            </span>
                        </label>
                    </div>
                </details>
            </div>

            <div class="recipes-grid" id="recipes-grid">
                <!-- Loaded dynamically -->
            </div>
        </section>

    </main>

    <!-- ============================================ -->
    <!-- RECIPE MODAL (DRAWER)                        -->
    <!-- ============================================ -->
    <div class="diet-modal-backdrop" id="recipe-modal-backdrop" role="dialog" aria-modal="true" aria-label="Receta">
        <div class="diet-modal-wrapper">
            <div class="diet-modal" id="recipe-modal">
                <!-- Close button — inside the card, overlapping the image -->
                <button class="diet-modal__close" id="modal-close-btn" aria-label="Cerrar receta">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="diet-modal__img-wrap">
                    <img class="diet-modal__img" id="modal-img" src="" alt="">
                </div>
                <div class="diet-modal__body">
                    <div class="diet-modal__header">
                        <h2 class="diet-modal__title" id="modal-title"></h2>
                    </div>
                    <div class="diet-modal__time">
                        <i class="fa-solid fa-clock"></i>
                        <span id="modal-time"></span>
                    </div>
                    <p class="diet-modal__ingredients-title">Ingredientes</p>
                    <ul class="diet-modal__ingredients" id="modal-ingredients"></ul>
                    <p class="diet-modal__instructions-title">Preparación</p>
                    <div class="diet-modal__instructions" id="modal-instructions"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/assets/js/core/router.js"></script>
    <script src="/assets/js/loaders/dieta-loader.js?v=1.1"></script>

</body>

</html>
