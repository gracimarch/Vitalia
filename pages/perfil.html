<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#B571DE">
    <title>Vitalia | Mi Perfil</title>
    <link rel="canonical" href="https://vitalia-selfcare.vercel.app/perfil">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/shared/css/variables.css?v=20260420">
    <link rel="stylesheet" href="/assets/shared/css/layout.css?v=20260420">
    <link rel="stylesheet" href="/assets/shared/css/utilities.css?v=20260420">
    <link rel="stylesheet" href="/assets/shared/css/common.css?v=20260420">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Auth: protección de ruta -->
    <script src="/assets/shared/js/core/router.js?v=20260420"></script>
    <script src="/assets/shared/js/core/main.js?v=20260420" defer></script>
    <script type="module" src="/features/auth/firebase.js?v=20260420"></script>
    <script type="module" src="/features/auth/auth-state.js?v=20260420"></script>

    <link rel="icon" href="/assets/favicons/vitalia-favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/assets/favicons/vitalia-favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/favicons/vitalia-favicon.png">

    <meta name="description" content="Gestiona tu perfil y preferencias en Vitalia.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="stylesheet" href="/features/profile/perfilstyle.css">
</head>

<body>

    <!-- Pantalla de carga -->
    <div id="loader" class="loader-container">
        <img src="/assets/favicons/vitalia-favicon.svg" alt="" aria-hidden="true" class="loader-logo">
    </div>

    <div id="header-placeholder"></div>

    <main class="profile-page" id="main-content">
        <div class="profile-container">

            <!-- Hero: animated gradient across turquesa + morado + naranja -->
            <div class="profile-hero" id="profile-hero">
                <div class="profile-hero-avatar" id="profile-avatar">?</div>
                <div class="profile-hero-info">
                    <h1 id="profile-display-name">
                        <span class="profile-skeleton wide"></span>
                    </h1>
                    <p class="profile-hero-email" id="profile-email">
                        <span class="profile-skeleton"></span>
                    </p>
                    <div class="profile-hero-badges">
                        <span class="profile-hero-badge">
                            <i class="fa-solid fa-leaf"></i>
                            Miembro Vitalia
                        </span>
                        <span class="profile-hero-badge">
                            <i class="fa-solid fa-star"></i>
                            Bienestar activo
                        </span>
                    </div>
                </div>
            </div>

            <!-- Stats row -->
            <div class="profile-stats">
                <div class="profile-stat-card">
                    <div class="profile-stat-icon"><i class="fa-solid fa-leaf"></i></div>
                    <div class="profile-stat-value">✓</div>
                    <div class="profile-stat-label">Perfil activo</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                    <div class="profile-stat-value" id="stat-goals-count">—</div>
                    <div class="profile-stat-label">Objetivos</div>
                </div>
                <div class="profile-stat-card">
                    <div class="profile-stat-icon"><i class="fa-solid fa-fire"></i></div>
                    <div class="profile-stat-value">100%</div>
                    <div class="profile-stat-label">Completado</div>
                </div>
            </div>

            <!-- Datos personales — purple accent -->
            <div class="profile-card profile-card-purple">
                <p class="profile-card-title">
                    <span class="profile-card-title-icon"><i class="fa-solid fa-user"></i></span>
                    Datos personales
                </p>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-id-card"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Nombre completo</div>
                        <div class="profile-field-value" id="field-fullname"><span class="profile-skeleton"></span></div>
                    </div>
                </div>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-envelope"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Correo electrónico</div>
                        <div class="profile-field-value" id="field-email"><span class="profile-skeleton"></span></div>
                    </div>
                </div>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-earth-americas"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">País</div>
                        <div class="profile-field-value" id="field-country"><span class="profile-skeleton"></span></div>
                    </div>
                </div>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-calendar-days"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Miembro desde</div>
                        <div class="profile-field-value" id="field-created"><span class="profile-skeleton"></span></div>
                    </div>
                </div>
            </div>

            <!-- Preferencias de bienestar — cyan accent -->
            <div class="profile-card profile-card-cyan">
                <p class="profile-card-title">
                    <span class="profile-card-title-icon"><i class="fa-solid fa-heart-pulse"></i></span>
                    Preferencias de bienestar
                </p>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-dumbbell"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Actividad física</div>
                        <div class="profile-field-value" id="field-activity"><span class="profile-skeleton"></span></div>
                    </div>
                </div>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-bowl-rice"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Tipo de dieta</div>
                        <div class="profile-field-value" id="field-diet"><span class="profile-skeleton"></span></div>
                    </div>
                </div>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-moon"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Calidad de sueño</div>
                        <div class="profile-field-value" id="field-sleep"><span class="profile-skeleton"></span></div>
                    </div>
                </div>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-brain"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Nivel de estrés</div>
                        <div class="profile-field-value" id="field-stress"><span class="profile-skeleton"></span></div>
                    </div>
                </div>

                <div class="profile-field">
                    <div class="profile-field-icon"><i class="fa-solid fa-bullseye"></i></div>
                    <div class="profile-field-content">
                        <div class="profile-field-label">Objetivos de bienestar</div>
                        <div class="profile-tags" id="field-goals"></div>
                    </div>
                </div>
            </div>

            <!-- Cuenta — orange accent -->
            <div class="profile-card profile-card-orange">
                <p class="profile-card-title">
                    <span class="profile-card-title-icon"><i class="fa-solid fa-gear"></i></span>
                    Cuenta
                </p>
                <div class="profile-actions">
                    <button class="profile-btn profile-btn-danger" id="profile-logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Cerrar sesión
                    </button>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="/assets/shared/js/core/load-components.js?v=20260420"></script>
    <script type="module" src="/features/profile/perfil.js?v=20260420"></script>

</body>

</html>
