<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#B571DE">
    <title id="page-title">Vitalia | Lectura</title>
    <link rel="canonical" href="https://vitalia-selfcare.vercel.app/lecturas/">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/core/variables.css">
    <link rel="stylesheet" href="/assets/css/core/layout.css">
    <link rel="stylesheet" href="/assets/css/core/utilities.css">
    <link rel="stylesheet" href="/assets/css/pages/shared-content-layout.css?v=1.2">
    <link href="/assets/css/core/common.css" rel="stylesheet">
    <script src="/assets/js/core/main.js" defer></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    

    <link rel="icon" href="/assets/favicons/vitalia-favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/assets/favicons/vitalia-favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/favicons/vitalia-favicon.png">

    <meta id="meta-description" name="description"
        content="Explora nuestras lecturas sobre bienestar integral en Vitalia.">
    <meta id="meta-keywords" name="keywords" content="bienestar, salud, productividad, vitalia">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Vitalia | Lectura">
    <meta property="og:description"
        content="Explora nuestras lecturas sobre bienestar integral en Vitalia.">
    <meta property="og:image" content="https://vitalia-selfcare.vercel.app/assets/images/ui/og-vitalia.jpg">
    <meta property="og:url" content="https://vitalia-selfcare.vercel.app/lecturas/">
    <meta name="twitter:title" content="Vitalia | Lectura">
    <meta name="twitter:description"
        content="Explora nuestras lecturas sobre bienestar integral en Vitalia.">
    <meta name="twitter:image" content="https://vitalia-selfcare.vercel.app/assets/images/ui/og-vitalia.jpg">

    <script src="/assets/js/core/router.js"></script>
</head>

<body>

    <!-- Pantalla de carga -->
    <div id="loader" class="loader-container">
        <img src="/assets/favicons/vitalia-favicon.svg" alt="" aria-hidden="true" class="loader-logo">
    </div>



    <!-- Contenido -->
    <main class="page-container" style="padding: 0; max-width: 100%;">

        <section class="lectura-hero" id="lectura-hero">
            <img class="lectura-hero__img" id="article-image" src="" alt="Imagen del Artículo" style="display: none;">
            <div class="lectura-hero__overlay"></div>

            <button class="lectura-back-btn" id="btn-back" onclick="history.back()" aria-label="Volver">
                <i class="bi bi-arrow-left"></i>
            </button>

            <div class="lectura-hero__content">
                <p class="lectura-hero__type" id="article-category">Cargando...</p>
                <h1 class="lectura-hero__title" id="article-title">Cargando artículo...</h1>
                <div class="lectura-hero__badges">
                    <div class="lectura-badge">
                        <i class="bi bi-clock" alt="Ícono de reloj"></i>
                        <span id="reading-time-text">-- minutos de lectura</span>
                    </div>
                </div>
            </div>
        </section>

        <div class="lectura-main-container">
            <div id="introduction" class="article introduction-container lectura-intro-card">
                <p>Cargando introducción...</p>
            </div>

            <div class="article-title">
                <h2>Índice de subtítulos</h2>
            </div>

            <div class="article">
                <ol id="table-of-contents">
                    <!-- Tabla de contenidos generada dinámicamente -->
                </ol>
            </div>

            <!-- Secciones del artículo se insertan dinámicamente aquí -->
            <div id="article-content" class="article-content-dynamic">
                <!-- El contenido completo del artículo se cargará aquí -->
            </div>
        </div>

    </main>

    <!-- Pie de página-->
    <div id="footer-placeholder"></div>
    <script src="/assets/js/core/load-components.js"></script>
    <script src="/assets/js/pages/article.js"></script>

    <!-- Dynamic content loader -->
    <script src="/assets/js/loaders/lectura-loader.js"></script>
</body>

</html>
