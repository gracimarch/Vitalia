<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E1947F">
    <title>Vitalia | Rutina</title>
    <link rel="canonical" href="https://vitalia-selfcare.vercel.app/rutinas/">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/core/variables.css?v=20260411">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/pages/routinestyle.css?v=20260411">

    <link rel="icon" href="/assets/favicons/vitalia-favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/assets/favicons/vitalia-favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/favicons/vitalia-favicon.png">

    <meta name="description" content="Rutina de ejercicios guiada para tu bienestar físico. Ejercicios personalizados con Vitalia.">
    <meta name="keywords" content="rutina, ejercicio, fitness, salud, vitalia">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Vitalia | Rutina de Ejercicios">
    <meta property="og:description"
        content="Rutina de ejercicios guiada para tu bienestar físico. Ejercicios personalizados con Vitalia.">
    <meta property="og:image" content="https://vitalia-selfcare.vercel.app/assets/images/ui/og-vitalia.jpg">
    <meta property="og:url" content="https://vitalia-selfcare.vercel.app/rutinas/">
    <meta name="twitter:title" content="Vitalia | Rutina de Ejercicios">
    <meta name="twitter:description"
        content="Rutina de ejercicios guiada para tu bienestar físico. Ejercicios personalizados con Vitalia.">
    <meta name="twitter:image" content="https://vitalia-selfcare.vercel.app/assets/images/ui/og-vitalia.jpg">

    <script src="/assets/js/core/router.js?v=20260411"></script>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
</head>

<body class="routine-body">

    <!-- ============================================ -->
    <!-- SCREEN 1: OVERVIEW (Exercise List)           -->
    <!-- ============================================ -->
    <section id="screen-overview" class="screen screen--overview active">
        <div class="overview-hero" id="overview-hero">
            <div class="overview-hero__overlay"></div>
            <button class="overview-back-btn" id="btn-back" aria-label="Volver">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="overview-hero__content">
                <h1 class="overview-title" id="overview-title"></h1>
                <div class="overview-badges" id="overview-badges"></div>
            </div>
        </div>

        <div class="overview-body">
            <div class="overview-description" id="overview-description"></div>
            
            <button class="overview-start-btn" id="btn-start-routine">
                <i class="fa-solid fa-play"></i>
                Comenzar rutina
            </button>

            <div class="overview-exercise-list" id="overview-exercise-list">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- SCREEN 2: WARMUP                             -->
    <!-- ============================================ -->
    <section id="screen-warmup" class="screen screen--warmup">
        <button class="screen-close-btn" id="btn-close-warmup" aria-label="Cerrar">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="warmup-content">
            <p class="warmup-question">¿PREPARADO?</p>
            <div class="hourglass-timer" id="warmup-hourglass">
                <div class="hourglass-fill" id="warmup-fill"></div>
                <span class="hourglass-number" id="warmup-timer">00:30</span>
            </div>
            <p class="warmup-detail" id="warmup-detail"></p>
            <button class="warmup-skip-btn" id="btn-skip-warmup">Saltar calentamiento <i class="fa-solid fa-angles-right"></i></button>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- SCREEN 3: EXERCISE EXECUTION (CORE)          -->
    <!-- ============================================ -->
    <section id="screen-exercise" class="screen screen--exercise">
        <video class="exercise-video-bg" id="exercise-video" playsinline muted loop></video>
        <div class="exercise-overlay"></div>

        <!-- Top bar -->
        <div class="exercise-top-bar">
            <button class="screen-close-btn" id="btn-close-exercise" aria-label="Cerrar">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h2 class="exercise-name" id="exercise-name"></h2>
        </div>

        <!-- Center info -->
        <div class="exercise-center">
            <p class="exercise-desc" id="exercise-desc"></p>
        </div>

        <!-- Square Breathing Overlay -->
        <div class="sq-breath-overlay" id="sq-breath-overlay" aria-hidden="true">
            <div class="sq-breath-container">
                <!-- Side labels -->
                <div class="sq-breath-label sq-breath-label--top" id="sq-label-0">INHALA 4s</div>
                <div class="sq-breath-label sq-breath-label--right" id="sq-label-1">SOSTIENE 4s</div>
                <div class="sq-breath-label sq-breath-label--bottom" id="sq-label-2">EXHALA 4s</div>
                <div class="sq-breath-label sq-breath-label--left" id="sq-label-3">SOSTIENE 4s</div>

                <div class="sq-breath-svg-wrapper">
                    <svg class="sq-breath-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- Background square (faint) -->
                        <rect x="10" y="10" width="180" height="180" rx="16" ry="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
                        
                        <!-- 4 Animated sides -->
                        <!-- Top (Inhale): left to right -->
                        <path id="sq-side-0" d="M 26 10 L 174 10" stroke="#80CACD" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="148" stroke-dashoffset="148" class="sq-side-path sq-side-top"/>
                        <!-- Right (Hold): top to bottom -->
                        <path id="sq-side-1" d="M 190 26 L 190 174" stroke="#E1947F" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="148" stroke-dashoffset="148" class="sq-side-path sq-side-right"/>
                        <!-- Bottom (Exhale): right to left -->
                        <path id="sq-side-2" d="M 174 190 L 26 190" stroke="#a0d8b8" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="148" stroke-dashoffset="148" class="sq-side-path sq-side-bottom"/>
                        <!-- Left (Hold): bottom to top -->
                        <path id="sq-side-3" d="M 10 174 L 10 26" stroke="#c4a3e0" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="148" stroke-dashoffset="148" class="sq-side-path sq-side-left"/>

                        <!-- Corner dots (optional, for aesthetics) -->
                        <circle cx="10" cy="10" r="4" fill="rgba(255,255,255,0.2)"/>
                        <circle cx="190" cy="10" r="4" fill="rgba(255,255,255,0.2)"/>
                        <circle cx="190" cy="190" r="4" fill="rgba(255,255,255,0.2)"/>
                        <circle cx="10" cy="190" r="4" fill="rgba(255,255,255,0.2)"/>
                        
                        <!-- Glowing indicator dot -->
                        <circle id="sq-breath-dot" cx="10" cy="10" r="6" fill="#fff" opacity="0"/>
                    </svg>

                    <!-- Center counter -->
                    <div class="sq-breath-center">
                        <div class="sq-breath-phase-text" id="sq-breath-phase">INHALA</div>
                        <div class="sq-breath-count" id="sq-breath-count">4</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="exercise-controls">
            <button class="control-btn" id="btn-prev" aria-label="Anterior">
                <i class="fa-solid fa-backward-step"></i>
            </button>
            <button class="control-btn control-btn--main" id="btn-pause" aria-label="Pausar">
                <i class="fa-solid fa-pause" id="pause-icon"></i>
            </button>
            <button class="control-btn" id="btn-next" aria-label="Siguiente">
                <i class="fa-solid fa-forward-step"></i>
            </button>
        </div>

        <!-- Timer + Progress -->
        <div class="exercise-timer-area">
            <span class="exercise-timer" id="exercise-timer">00:30</span>
            <div class="exercise-progress-track">
                <div class="exercise-progress-bar" id="exercise-progress-bar"></div>
            </div>
        </div>

        <!-- Next Up Card -->
        <div class="next-up-card" id="next-up-card">
            <div class="next-up-info">
                <span class="next-up-label">Siguiente</span>
                <span class="next-up-title" id="next-up-title"></span>
            </div>
            <button class="next-up-skip" id="btn-skip-to-next" aria-label="Saltar al siguiente">
                <i class="fa-solid fa-forward"></i>
            </button>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- SCREEN 4: REST                               -->
    <!-- ============================================ -->
    <section id="screen-rest" class="screen screen--rest">
        <button class="screen-close-btn" id="btn-close-rest" aria-label="Cerrar">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="rest-content">
            <p class="rest-label">Descanso</p>
            <div class="hourglass-timer" id="rest-hourglass">
                <div class="hourglass-fill" id="rest-fill"></div>
                <span class="hourglass-number" id="rest-timer">00:15</span>
            </div>
            <p class="rest-motivation" id="rest-motivation">¡Vas muy bien! Respira profundo.</p>
        </div>

        <div class="rest-next-up" id="rest-next-up">
            <span class="rest-next-label">Siguiente ejercicio</span>
            <span class="rest-next-title" id="rest-next-title"></span>
        </div>

        <button class="rest-skip-btn" id="btn-skip-rest">Saltar descanso <i class="fa-solid fa-angles-right"></i></button>
    </section>

    <!-- ============================================ -->
    <!-- SCREEN 5: FINISH                             -->
    <!-- ============================================ -->
    <section id="screen-finish" class="screen screen--finish">
        <div class="finish-content">
            <div class="finish-icon">
                <lord-icon
                    src="https://cdn.lordicon.com/namwvlmv.json"
                    trigger="loop"
                    delay="300"
                    colors="primary:#E1947F,secondary:#80CACD"
                    style="width:140px;height:140px">
                </lord-icon>
            </div>
            <h1 class="finish-title">¡Rutina completada!</h1>
            <p class="finish-subtitle" id="finish-subtitle">Excelente trabajo. Has dado lo mejor de ti hoy.</p>

            <div class="finish-stats" id="finish-stats">
                <div class="finish-stat">
                    <span class="finish-stat-value" id="stat-exercises">0</span>
                    <span class="finish-stat-label">Ejercicios</span>
                </div>
                <div class="finish-stat">
                    <span class="finish-stat-value" id="stat-duration">0</span>
                    <span class="finish-stat-label">Minutos</span>
                </div>
            </div>

            <button class="finish-btn" id="btn-finish-back">
                <i class="fa-solid fa-arrow-left"></i>
                Volver a Mi Espacio
            </button>
        </div>
    </section>

    <script src="/assets/js/utils/voice-service.js?v=20260411-2"></script>
    <script src="/assets/js/pages/routine.js?v=20260411-2"></script>
</body>

</html>
